<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="grad-file-transfer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#802dcf;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-file-transfer" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.22" />
    </filter>
  </defs>

  <!-- background -->
  <rect width="600" height="400" fill="url(#grad-file-transfer)" rx="16" />

  <!-- icon backdrop -->
  <circle cx="300" cy="200" r="100" fill="#ffffff" fill-opacity="0.14" filter="url(#shadow-file-transfer)" />

  <!-- soft accent ring -->
  <circle cx="300" cy="200" r="118" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2" />

  <!-- icon -->
  <svg x="222" y="122" width="156" height="156" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3v12" fill="none" stroke="#ffffff" />
    <path d="m17 8-5-5-5 5" fill="none" stroke="#ffffff" />
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" fill="none" stroke="#ffffff" />
  </svg>
</svg>
