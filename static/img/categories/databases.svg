<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="grad-databases" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#007dc1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-databases" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.22" />
    </filter>
  </defs>

  <!-- background -->
  <rect width="600" height="400" fill="url(#grad-databases)" rx="16" />

  <!-- icon backdrop -->
  <circle cx="300" cy="200" r="100" fill="#ffffff" fill-opacity="0.14" filter="url(#shadow-databases)" />

  <!-- soft accent ring -->
  <circle cx="300" cy="200" r="118" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2" />

  <!-- icon -->
  <svg x="222" y="122" width="156" height="156" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="12" cy="5" rx="9" ry="3" fill="none" stroke="#ffffff" />
    <path d="M3 5V19A9 3 0 0 0 21 19V5" fill="none" stroke="#ffffff" />
    <path d="M3 12A9 3 0 0 0 21 12" fill="none" stroke="#ffffff" />
  </svg>
</svg>
