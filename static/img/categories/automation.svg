<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="grad-automation" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d14b00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow-automation" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.22" />
    </filter>
  </defs>

  <!-- background -->
  <rect width="600" height="400" fill="url(#grad-automation)" rx="16" />

  <!-- icon backdrop -->
  <circle cx="300" cy="200" r="100" fill="#ffffff" fill-opacity="0.14" filter="url(#shadow-automation)" />

  <!-- soft accent ring -->
  <circle cx="300" cy="200" r="118" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2" />

  <!-- icon -->
  <svg x="222" y="122" width="156" height="156" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect width="8" height="8" x="3" y="3" rx="2" fill="none" stroke="#ffffff" />
    <path d="M7 11v4a2 2 0 0 0 2 2h4" fill="none" stroke="#ffffff" />
    <rect width="8" height="8" x="13" y="13" rx="2" fill="none" stroke="#ffffff" />
  </svg>
</svg>
